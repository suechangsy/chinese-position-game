<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chinese Position Game - Smart Emoji</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f4f4f4;
}
#game{
  width:700px;
  height:450px;
  margin:auto;
  border:2px solid #ccc;
  background:white;
  position:relative;
}
#table{
  position:absolute;
  top:220px;
  left:300px;
  font-size:160px; /* 放大显示沙发 */
  font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
}
#object{
  position:absolute;
  top:80px;
  left:120px;
  font-size:150px;
  cursor:grab;
  font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
}
button{
  margin:6px;
  padding:8px 14px;
}
input{
  padding:5px;
  font-size:16px;
}
select{
  padding:5px;
  font-size:16px;
}
</style>
</head>
<body>

<h2 id="instruction"></h2>
<div id="pinyin"></div>

<h3>Level: <span id="level">1</span></h3>

<div style="margin:10px">
Object:
<input id="objectInput" placeholder="猫">
Target:
<input id="targetInput" placeholder="沙发">
<button onclick="applyWords()">Apply</button>
<br><br>
Level:
<select id="levelSelect" onchange="changeLevel()">
  <option value="1">1 – 上/下</option>
  <option value="2">2 – 左/右</option>
  <option value="3">3 – 前/后/中间</option>
</select>
<br><br>
<button onclick="toggleHints()">显示/隐藏方位提示</button>
<button onclick="speak()">🔊 Listen</button>
</div>

<div id="game">
  <div id="table">🛋</div> <!-- 沙发 -->
  <div id="object">🐱</div>
</div>

<h3>Score: <span id="score">0</span></h3>
<button onclick="nextRound()">Next</button>

<script>
// ===== 智能 Emoji 系统 =====
const emojiMap={
"猫":"🐱","狗":"🐶","兔子":"🐰","熊猫":"🐼",
"苹果":"🍎","香蕉":"🍌","西瓜":"🍉","橙子":"🍊","鸡蛋":"🥚",
"书":"📘","笔":"✏️","沙发":"🛋","椅子":"🪑",
"杯子":"☕","球":"⚽","车":"🚗","手机":"📱","电脑":"💻",
"鱼":"🐟","鸡":"🐔","猪":"🐷","牛":"🐮","羊":"🐑","面包":"🍞",
"奶瓶":"🍼","帽子":"🧢","雨伞":"☂️","钥匙":"🔑"
}

function getEmoji(word){
  if(emojiMap[word]) return emojiMap[word]
  return "📦"
}

// ===== 中文转拼音 =====
const pinyinMap = {
  "猫":"māo","狗":"gǒu","兔":"tù","兔子":"tùzi","熊猫":"xióngmāo",
  "沙发":"shāfā","椅子":"yǐzi","桌子":"zhuōzi",
  "苹果":"píngguǒ","香蕉":"xiāngjiāo","西瓜":"xīguā"
}

function toPinyin(word){
  let result=""
  for(let i=0;i<word.length;i++){
    let c = word[i]
    if(pinyinMap[c]) result+=pinyinMap[c]+" "
    else if(pinyinMap[word]) { result=pinyinMap[word]; break } // 支持多字词
    else result+=c+" "
  }
  return result.trim()
}

// ===== 方位词 =====
const positions=[
{cn:"上面",py:"shàngmiàn"},
{cn:"下面",py:"xiàmiàn"},
{cn:"左边",py:"zuǒbiān"},
{cn:"右边",py:"yòubiān"},
{cn:"前面",py:"qiánmiàn"},
{cn:"后面",py:"hòumiàn"},
{cn:"中间",py:"zhōngjiān"}
]

let level=1, score=0
let currentPos, customObject="猫", customTarget="沙发"
let hintsVisible = true

// ===== 分级系统 =====
function getPositions(){
  if(level==1) return positions.filter(p=>p.cn=="上面"||p.cn=="下面")
  if(level==2) return positions.filter(p=>p.cn=="左边"||p.cn=="右边")
  return positions
}

// ===== 更新一轮 =====
function nextRound(){
  let posList=getPositions()
  currentPos=posList[Math.floor(Math.random()*posList.length)]
  document.getElementById("object").innerText=getEmoji(customObject)
  document.getElementById("table").innerText=getEmoji(customTarget)
  
  document.getElementById("instruction").innerText=
    "把"+customObject+"放在"+customTarget+currentPos.cn
  document.getElementById("pinyin").innerText=
    "bǎ "+toPinyin(customObject)+" fàng zài "+toPinyin(customTarget)+" "+currentPos.py
  
  document.getElementById("instruction").style.display = hintsVisible ? "block" : "none"
  document.getElementById("pinyin").style.display = hintsVisible ? "block" : "none"
}

// ===== 语音 =====
function speak(){
  let text="把"+customObject+"放在"+customTarget+currentPos.cn
  let utter=new SpeechSynthesisUtterance(text)
  utter.lang="zh-CN"
  speechSynthesis.speak(utter)
}

// ===== 应用输入文字 =====
function applyWords(){
  let o=document.getElementById("objectInput").value
  let t=document.getElementById("targetInput").value
  if(o) customObject=o
  if(t) customTarget=t
  document.getElementById("object").innerText=getEmoji(customObject)
  document.getElementById("table").innerText=getEmoji(customTarget)
  nextRound()
}

// ===== 切换 Level =====
function changeLevel(){
  level = parseInt(document.getElementById("levelSelect").value)
  document.getElementById("level").innerText = level
  nextRound()
}

// ===== 显示/隐藏提示 =====
function toggleHints(){
  hintsVisible = !hintsVisible
  document.getElementById("instruction").style.display = hintsVisible ? "block" : "none"
  document.getElementById("pinyin").style.display = hintsVisible ? "block" : "none"
}

// ===== 拖拽 =====
const obj=document.getElementById("object")
let dragging=false
obj.addEventListener("mousedown",()=>dragging=true)
obj.addEventListener("touchstart",()=>dragging=true)
document.addEventListener("mousemove",drag)
document.addEventListener("touchmove",drag)
document.addEventListener("mouseup",endDrag)
document.addEventListener("touchend",endDrag)

function drag(e){
  if(!dragging) return
  const gameRect = document.getElementById("game").getBoundingClientRect()
  let x, y
  if(e.touches){
    x = e.touches[0].clientX - gameRect.left
    y = e.touches[0].clientY - gameRect.top
  } else {
    x = e.clientX - gameRect.left
    y = e.clientY - gameRect.top
  }
  obj.style.left = (x - obj.offsetWidth/2) + "px"
  obj.style.top = (y - obj.offsetHeight/2) + "px"
}

function endDrag(){
  if(!dragging) return
  dragging=false
  checkAnswer()
}

// ===== 判断位置 =====
function checkAnswer(){
  const gameRect=document.getElementById("game").getBoundingClientRect()
  const objRect=obj.getBoundingClientRect()
  const centerX = objRect.left - gameRect.left + obj.offsetWidth/2
  const centerY = objRect.top - gameRect.top + obj.offsetHeight/2
  const table = document.getElementById("table")
  const tableRect = table.getBoundingClientRect()
  const tableCenterX = tableRect.left - gameRect.left + tableRect.width/2
  const tableCenterY = tableRect.top - gameRect.top + tableRect.height/2

  let correct=false

  switch(currentPos.cn){
    case "上面":
      if(centerY < tableCenterY) correct=true
      break;
    case "下面":
      if(centerY > tableCenterY) correct=true
      break;
    case "左边":
      if(centerX < tableCenterX) correct=true
      break;
    case "右边":
      if(centerX > tableCenterX) correct=true
      break;
    case "前面":
      if(centerY < tableCenterY && centerX > tableCenterX - tableRect.width/2 && centerX < tableCenterX + tableRect.width/2)
        correct=true
      break;
    case "后面":
      if(centerY > tableCenterY && centerX > tableCenterX - tableRect.width/2 && centerX < tableCenterX + tableRect.width/2)
        correct=true
      break;
    case "中间":
      if(centerX > tableCenterX - tableRect.width/2 &&
         centerX < tableCenterX + tableRect.width/2 &&
         centerY > tableCenterY - tableRect.height/2 &&
         centerY < tableCenterY + tableRect.height/2)
        correct=true
      break;
  }

  if(correct){
    score++
    document.getElementById("score").innerText=score
    alert("✅ Correct!")
    nextRound()
  }else{
    alert("❌ Try again")
  }
}

// ===== 初始化 =====
nextRound()
</script>
</body>
</html>
