<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chinese Position Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#gameArea{
width:500px;
height:400px;
border:2px solid #ccc;
margin:auto;
position:relative;
background:white;
}

#table{
width:150px;
position:absolute;
top:170px;
left:175px;
}

#cat{
width:70px;
position:absolute;
top:30px;
left:30px;
cursor:grab;
font-size:50px;
}

#wordList{
position:fixed;
right:20px;
top:120px;
background:white;
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

td{
padding:3px 8px;
}

button{
margin:8px;
padding:8px 14px;
font-size:14px;
}

</style>
</head>

<body>

<h2 id="instruction"></h2>

<button onclick="speak()">🔊 Listen</button>
<button onclick="toggleWords()">👁 Hide Words</button>

<div id="gameArea">

<div id="table">🪑</div>

<div id="cat" draggable="true">🐱</div>

</div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="newRound()">Next</button>


<div id="wordList">

<h3>方位词</h3>

<table>

<tr><td>上面</td><td>shàngmiàn</td><td>on</td></tr>
<tr><td>下面</td><td>xiàmiàn</td><td>under</td></tr>
<tr><td>左边</td><td>zuǒbiān</td><td>left</td></tr>
<tr><td>右边</td><td>yòubiān</td><td>right</td></tr>
<tr><td>前面</td><td>qiánmiàn</td><td>front</td></tr>
<tr><td>后面</td><td>hòumiàn</td><td>behind</td></tr>
<tr><td>中间</td><td>zhōngjiān</td><td>middle</td></tr>

</table>

</div>


<script>

const positions = [
{cn:"上面",en:"on"},
{cn:"下面",en:"under"},
{cn:"左边",en:"left"},
{cn:"右边",en:"right"},
{cn:"前面",en:"in front"},
{cn:"后面",en:"behind"}
]

let current
let score = 0

function newRound(){

current = positions[Math.floor(Math.random()*positions.length)]

document.getElementById("instruction").innerHTML =
"把猫放在桌子" + current.cn + "<br>Put the cat " + current.en + " the table"

}

function speak(){

let text = "把猫放在桌子" + current.cn

let utterance = new SpeechSynthesisUtterance(text)

utterance.lang = "zh-CN"

speechSynthesis.speak(utterance)

}

let visible = true

function toggleWords(){

let box = document.getElementById("wordList")

if(visible){

box.style.display="none"
event.target.innerText="👁 Show Words"

}else{

box.style.display="block"
event.target.innerText="👁 Hide Words"

}

visible=!visible

}

const cat = document.getElementById("cat")

cat.onmouseup = function(){

let x = cat.offsetLeft
let y = cat.offsetTop

let correct=false

if(current.cn=="上面" && y < 160) correct=true
if(current.cn=="下面" && y > 240) correct=true
if(current.cn=="左边" && x < 160) correct=true
if(current.cn=="右边" && x > 260) correct=true

if(correct){

score++
document.getElementById("score").innerText=score
alert("✅ Correct!")

}else{

alert("❌ Try again")

}

}

newRound()

</script>

</body>
</html>
