<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chinese Position Game - Smart Emoji</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f4f4f4;
}

#game{
  width:700px;
  height:450px;
  margin:auto;
  border:2px solid #ccc;
  background:white;
  position:relative;
}

#table{
  position:absolute;
  top:220px;
  left:330px;
  font-size:160px;
}

#object{
  position:absolute;
  top:80px;
  left:120px;
  font-size:150px;
  cursor:grab;
}

button{
  margin:6px;
  padding:8px 14px;
}

input{
  padding:5px;
  font-size:16px;
}
</style>

</head>
<body>

<h2 id="instruction"></h2>
<div id="pinyin"></div>

<h3>Level: <span id="level">1</span></h3>

<div style="margin:10px">
Object:
<input id="objectInput" placeholder="猫">
Target:
<input id="targetInput" placeholder="桌子">
<button onclick="applyWords()">Apply</button>
</div>

<button onclick="speak()">🔊 Listen</button>

<div id="game">
  <div id="table">🟫</div>
  <div id="object">🐱</div>
</div>

<h3>Score: <span id="score">0</span></h3>
<button onclick="nextRound()">Next</button>

<script>
// ==== 名词 + Emoji 智能系统 ====
const emojiMap={
"猫":"🐱","狗":"🐶","兔子":"🐰","熊猫":"🐼",
"苹果":"🍎","香蕉":"🍌","西瓜":"🍉","橙子":"🍊","鸡蛋":"🥚",
"书":"📘","笔":"✏️","桌子":"🟫","椅子":"🪑",
"杯子":"☕","球":"⚽","车":"🚗","手机":"📱","电脑":"💻",
"鱼":"🐟","鸡":"🐔","猪":"🐷","牛":"🐮","羊":"🐑","面包":"🍞","奶瓶":"🍼","帽子":"🧢","雨伞":"☂️","钥匙":"🔑"
}

// 获取 emoji
function getEmoji(word){
  if(emojiMap[word]){
    return emojiMap[word]
  }
  return "📦" // 默认
}

// ==== 方位词 ====
const positions=[
{cn:"上面",py:"shàngmiàn"},
{cn:"下面",py:"xiàmiàn"},
{cn:"左边",py:"zuǒbiān"},
{cn:"右边",py:"yòubiān"},
{cn:"前面",py:"qiánmiàn"},
{cn:"后面",py:"hòumiàn"}
]

let level=1, score=0
let currentPos, customObject="猫", customTarget="桌子"

function getPositions(){
  if(level==1) return positions.filter(p=>p.cn=="上面"||p.cn=="下面")
  if(level==2) return positions.filter(p=>p.cn=="左边"||p.cn=="右边")
  return positions
}

// ==== 更新一轮 ====
function nextRound(){
  let posList=getPositions()
  currentPos=posList[Math.floor(Math.random()*posList.length)]
  // 随机选择 emoji 如果想保留 ObjectInput 可以取消下一行
  // customObject=customObject || "猫"
  document.getElementById("object").innerText=getEmoji(customObject)
  document.getElementById("table").innerText=getEmoji(customTarget)

  document.getElementById("instruction").innerText=
    "把"+customObject+"放在"+customTarget+currentPos.cn
  document.getElementById("pinyin").innerText=
    "bǎ "+customObject+" fàng zài "+customTarget+" "+currentPos.py
}

// ==== 语音 ====
function speak(){
  let text="把"+customObject+"放在"+customTarget+currentPos.cn
  let utter=new SpeechSynthesisUtterance(text)
  utter.lang="zh-CN"
  speechSynthesis.speak(utter)
}

// ==== 应用输入文字 ====
function applyWords(){
  let o=document.getElementById("objectInput").value
  let t=document.getElementById("targetInput").value
  if(o) customObject=o
  if(t) customTarget=t
  document.getElementById("object").innerText=getEmoji(customObject)
  document.getElementById("table").innerText=getEmoji(customTarget)
  nextRound()
}

// ==== 拖拽支持鼠标 + 手机 ====
const obj=document.getElementById("object")
let dragging=false

obj.addEventListener("mousedown",()=>dragging=true)
obj.addEventListener("touchstart",()=>dragging=true)

document.addEventListener("mousemove",drag)
document.addEventListener("touchmove",drag)

document.addEventListener("mouseup",endDrag)
document.addEventListener("touchend",endDrag)

function drag(e){
  if(!dragging) return
  let x, y
  if(e.touches){
    x=e.touches[0].pageX
    y=e.touches[0].pageY
  }else{
    x=e.pageX
    y=e.pageY
  }
  obj.style.left=(x-70)+"px"
  obj.style.top=(y-150)+"px"
}

function endDrag(){
  if(!dragging) return
  dragging=false
  checkAnswer()
}

// ==== 判断位置 ====
function checkAnswer(){
  let rect=obj.getBoundingClientRect()
  let x=rect.left
  let y=rect.top
  let correct=false

  if(currentPos.cn=="上面" && y<200) correct=true
  if(currentPos.cn=="下面" && y>320) correct=true
  if(currentPos.cn=="左边" && x<300) correct=true
  if(currentPos.cn=="右边" && x>450) correct=true

  if(correct){
    score++
    document.getElementById("score").innerText=score
    alert("✅ Correct!")
    if(score==5){level=2; document.getElementById("level").innerText=2; alert("Level 2!")}
    if(score==10){level=3; document.getElementById("level").innerText=3; alert("Level 3!")}
    nextRound()
  }else{
    alert("❌ Try again")
  }
}

// ==== 初始一轮 ====
nextRound()
</script>
</body>
</html>
